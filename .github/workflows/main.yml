name: ZeroMcp.TestKit.dotnet Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:

  ci:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test ./tests/ZeroMcp.TestKit.Tests/ZeroMcp.TestKit.Tests.csproj --configuration Release --no-build --no-restore


  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Extract version from release tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Pack with release version
        run: >
          dotnet pack src/ZeroMcp.TestKit.Xunit/ZeroMcp.TestKit.Xunit.csproj
          --configuration Release
          /p:PackageVersion=${{ steps.version.outputs.version }}
          --no-build
          --output ./artifacts

      - name: Download latest TestKitEngine release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --repo ZeroMcp/ZeroMcp.TeskKitEngine --pattern "mcptest-*"

      - name: Unpack engine binaries into NuGet runtimes layout
        run: |
          declare -A RID_MAP=(
            ["x86_64-pc-windows-msvc"]="win-x64"
            ["aarch64-pc-windows-msvc"]="win-arm64"
            ["x86_64-unknown-linux-gnu"]="linux-x64"
            ["aarch64-unknown-linux-gnu"]="linux-arm64"
            ["x86_64-apple-darwin"]="osx-x64"
            ["aarch64-apple-darwin"]="osx-arm64"
          )

          RUNTIMES="src/ZeroMcp.TestKit/runtimes"

          for triple in "${!RID_MAP[@]}"; do
            rid="${RID_MAP[$triple]}"
            dest="$RUNTIMES/$rid/native"
            mkdir -p "$dest"

            zip=$(ls mcptest-*-${triple}.zip 2>/dev/null || true)
            tgz=$(ls mcptest-*-${triple}.tar.gz 2>/dev/null || true)

            if [ -n "$zip" ]; then
              unzip -o "$zip" -d "$dest"
            elif [ -n "$tgz" ]; then
              tar xzf "$tgz" -C "$dest"
            else
              echo "WARNING: No asset found for $triple ($rid)"
            fi
          done

          echo "=== Runtimes layout ==="
          find "$RUNTIMES" -type f

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack with release version
        run: >
          dotnet pack src/ZeroMcp.TestKit/ZeroMcp.TestKit.csproj
          --configuration Release
          /p:PackageVersion=${{ steps.version.outputs.version }}
          --no-build
          --output ./artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
